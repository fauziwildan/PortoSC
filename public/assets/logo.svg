<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Vibrant Glowing Gradients -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" /> <!-- Purple -->
      <stop offset="50%" stop-color="#6366f1" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background container, subtle and dark -->
  <rect width="100" height="100" rx="20" fill="#0c0a0f" />

  <!-- Outer ring / frame -->
  <rect x="15" y="15" width="70" height="70" rx="14" fill="none" stroke="url(#neonGradient)" stroke-width="2.5" opacity="0.4" />

  <!-- Dynamic Creative "S" / "C" Shape -->
  <path d="M 40 30 
           C 55 30, 65 35, 65 48 
           C 65 58, 55 60, 50 60 
           C 40 60, 35 62, 35 70 
           C 35 78, 45 80, 55 80 
           C 65 80, 70 75, 70 70" 
        fill="none" 
        stroke="url(#neonGradient)" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <!-- Intertwining spark/lightning element to show "Suddenly" (Creative Spark) -->
  <polygon points="50,20 54,34 46,38 52,48 42,42 46,32" 
           fill="#facc15" 
           filter="url(#glow)" />
</svg>
